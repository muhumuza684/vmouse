name: vmouse
description: VMouse - Control your PC from your phone
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^2.4.0
  mobile_scanner: ^5.0.0
  permission_handler: ^11.0.0
  vibration: ^2.0.0
  shared_preferences: ^2.2.0
  qr_flutter: ^4.1.0
  network_info_plus: ^6.0.0
  google_fonts: ^6.1.0
  win32: 5.10.1
  ffi: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
